<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Iftar Time</title>

    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- STARTUP MODAL -->
    <div class="modal-overlay" id="adhanModal">
        <div class="modal-box">
            <div class="modal-icon">
                <i class="fa-solid fa-volume-high"></i>
            </div>
            <h2>Enable Adhan</h2>
            <p>
                Turn On Adhan To Hear Adhan At Iftar Time.
            </p>

            <div class="modal-actions">
                <button class="modal-btn primary" onclick="enableAdhanFromModal()">
                    Enable Adhan
                </button>
                <button class="modal-btn secondary" onclick="closeAdhanModal()">
                    Not Now
                </button>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">TG Iftar Time</div>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
    </div>

    <div class="menu" id="menu">
        <a href="#" onclick="showHome()">Home</a>
        <a href="#" onclick="showFull()">Full View</a>
    </div>

    <div class="container">

        <!-- HOME -->
        <div id="homeSection">
            <div class="card">
                <h2>Today's Time</h2>

                <div class="time-block" id="dateBlock">
                    <div class="label">
                        <i class="fa-solid fa-calendar-days icon"></i>
                        Date
                    </div>
                    <div class="value highlight" id="todayDate"></div>
                </div>

                <div class="time-block" id="iftarBlock">
                    <div class="label">
                        <i class="fa-solid fa-moon icon"></i>
                        Iftar
                    </div>
                    <div class="value highlight">
                        <span id="todayIftar"></span> PM
                    </div>
                    <div class="countdown" id="iftarCountdown"></div>
                </div>

                <div class="time-block" id="sehriBlock">
                    <div class="label">
                        <i class="fa-solid fa-sun icon"></i>
                        Sehri
                    </div>
                    <div class="value highlight">
                        <span id="todaySehri"></span> AM
                    </div>
                    <div class="countdown" id="sehriCountdown"></div>
                </div>

                <!-- ADHAN CONTROL -->
                <div class="time-block" id="adhanControlBlock">
                    <div class="label">
                        <i class="fa-solid fa-bell icon"></i>
                        Adhan Alert
                    </div>

                    <div class="adhan-controls">
                        <button id="enableAdhanBtn" class="adhan-btn" onclick="enableAdhan()">
                            <i class="fa-solid fa-volume-high"></i>
                            <span>Enable</span>
                        </button>

                        <button id="muteToggleBtn" class="mute-btn" onclick="toggleMute()" disabled>
                            <i class="fa-solid fa-volume-xmark"></i>
                            <span>Sound Off</span>
                        </button>
                    </div>

                    <div class="countdown" id="adhanStatus">Adhan Disabled</div>
                </div>
            </div>
        </div>

        <!-- FULL VIEW -->
        <div id="fullSection" class="hidden">
            <h2>Full Ramadan Schedule</h2>
            <table>
                <thead>
                    <tr>
                        <th>Roza</th>
                        <th>Date</th>
                        <th>Iftar</th>
                        <th>Sehri</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- AUDIO -->
    <audio id="adhanAudio" preload="auto">
        <source src="adhan.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="index.js"></script>
</body>
</html>
